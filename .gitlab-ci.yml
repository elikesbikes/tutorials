stages:
  - deploy

variables:
  GIT_DEPTH: "0"

.deploy_template: &deploy_template
  stage: deploy
  when: manual
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync git
    - chmod 600 "$SSH_PRIVATE_KEY"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
        PROJECT=""
      else
        PROJECT=$(git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" | { grep "^docker-compose/" || true; } | cut -d/ -f2 | sort -u | head -1)
      fi
    - echo "Detected project = ${PROJECT:-none}"

deploy:ranger0:
  <<: *deploy_template
  script:
    - |
      if [ -z "$PROJECT" ] || [ "$PROJECT" = "none" ]; then
        echo "No docker-compose project changed — nothing to deploy"
        exit 0
      fi
      echo "==> Deploying $PROJECT to ranger0..."
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.16 bash -s << EOF
        set -e
        echo "--- sync repo"
        cd ~/devops/github/tutorials
        git fetch origin
        git reset --hard origin/main

        echo "--- rsync files"
        mkdir -p ~/devops/docker/$PROJECT
        rsync -am --ignore-errors \
          --include='*/' --include='*.yml' --include='*.py' \
          --include='*.sh' --include='*.md' --include='*.json' \
          --exclude='*' \
          ~/devops/github/tutorials/docker-compose/$PROJECT/ \
          ~/devops/docker/$PROJECT/

        echo "--- docker compose up"
        cd ~/devops/docker/$PROJECT
        docker compose up -d

        echo "--- health check"
        sleep 5
        RUNNING=\$(docker compose ps --filter status=running --services 2>/dev/null | wc -l)
        TOTAL=\$(docker compose ps --services 2>/dev/null | wc -l)
        echo "Running: \$RUNNING / \$TOTAL services"
        if [ "\$RUNNING" -lt "\$TOTAL" ]; then
          echo "ERROR: Not all services started"
          docker compose ps
          docker compose logs --tail=30
          exit 1
        fi
        echo "==> $PROJECT deployed successfully on ranger0"
      EOF

