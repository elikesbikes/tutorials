stages:
  - deploy

variables:
  GIT_DEPTH: "0"

.deploy_template: &deploy_template
  stage: deploy
  when: manual
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client rsync git
    - chmod 600 "$SSH_PRIVATE_KEY"
    - |
      if [ "$CI_COMMIT_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
        PROJECT=""
      else
        PROJECT=$(git diff --name-only "$CI_COMMIT_BEFORE_SHA" "$CI_COMMIT_SHA" | { grep "^docker-compose/" || true; } | cut -d/ -f2 | sort -u | head -1)
      fi
    - echo "Detected project = ${PROJECT:-none}"

deploy:ranger0:
  <<: *deploy_template
  script:
    - |
      if [ -z "$PROJECT" ] || [ "$PROJECT" = "none" ]; then
        echo "No docker-compose project changed — nothing to deploy"
        exit 0
      fi
      echo "Deploying $PROJECT to ranger0..."
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.16 "
        cd ~/devops/github/tutorials && git fetch origin && git reset --hard origin/main
        mkdir -p ~/devops/docker/$PROJECT
        rsync -am --include='*/' --include='*.yml' --include='*.py' --include='*.sh' --include='*.md' --include='*.json' --exclude='*' ~/devops/github/tutorials/docker-compose/$PROJECT/ ~/devops/docker/$PROJECT/
        cd ~/devops/docker/$PROJECT && docker compose up -d
      "

deploy:endurance:
  <<: *deploy_template
  script:
    - |
      if [ -z "$PROJECT" ] || [ "$PROJECT" = "none" ]; then
        echo "No docker-compose project changed — nothing to deploy"
        exit 0
      fi
      echo "Deploying $PROJECT to endurance..."
      ssh -i "$SSH_PRIVATE_KEY" -o StrictHostKeyChecking=no ecloaiza@192.168.5.30 "
        cd ~/devops/github/tutorials && git fetch origin && git reset --hard origin/main
        mkdir -p ~/devops/docker/$PROJECT
        rsync -am --include='*/' --include='*.yml' --include='*.py' --include='*.sh' --include='*.md' --include='*.json' --exclude='*' ~/devops/github/tutorials/docker-compose/$PROJECT/ ~/devops/docker/$PROJECT/
        cd ~/devops/docker/$PROJECT && docker compose up -d
      "
