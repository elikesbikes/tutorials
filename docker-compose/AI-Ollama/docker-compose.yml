services:
  ollama:
    image: ollama/ollama:latest
    container_name: ${OLLAMA_NAME}
    hostname: ${OLLAMA_NAME}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ${OLLAMA_DATA_PATH}:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - TZ=America/Los_Angeles
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.5.30:514"
        syslog-format: "rfc3164"
        tag: "ai-ollama"
    networks:
      - frontend

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    container_name: ${WEBUI_NAME}
    hostname: ${WEBUI_NAME}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${WEBUI_PORT}:8080"
    volumes:
      - ${WEBUI_DATA_PATH}:/app/backend/data
      - ./openwebui_models:/app/backend/models
    environment:
      - OLLAMA_API_URL=http://${OLLAMA_NAME}:11434
      - TZ=America/Los_Angeles
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.5.30:514"
        syslog-format: "rfc3164"
        tag: "ai-openwebui"
    networks:
      - frontend
    depends_on:
      - ollama

networks:
  frontend:
    external: true
