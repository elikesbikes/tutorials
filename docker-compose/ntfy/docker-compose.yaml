version: "2.3"
services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    hostname: ntfy
    command:
      - serve
    environment:
      - "TZ=America/Los_Angeles"
    user: 0:0 # optional: Set custom user/group or uid/gid
    volumes:
      - ./cache/ntfy:/var/cache/ntfy
      - ./etc/ntfy:/etc/ntfy
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.5.20:1514"
        #syslog-format: "rfc3164"
        tag: "ntfy"
    # Ports no longer published — reachable only through Traefik on the frontend network.
    networks:
      frontend:
    healthcheck: # optional: remember to adapt the host:port to your environment
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ntfy.rule=Host(`ntfy.home.elikesbikes.com`)"
      - "traefik.http.routers.ntfy.entrypoints=websecure"
      - "traefik.http.routers.ntfy.tls.certresolver=production"
      - "traefik.http.routers.ntfy.middlewares=security-headers@file"
      - "traefik.http.services.ntfy.loadbalancer.server.port=80"
networks:
  frontend:
    external: true
