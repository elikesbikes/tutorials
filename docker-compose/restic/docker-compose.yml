services:
  restic:
    build: .
    container_name: restic
    hostname: ${CONTAINER_HOSTNAME:-ranger0}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # App code — bind-mounted individually so changes take effect without a rebuild
      - ./app/entrypoint.sh:/app/entrypoint.sh:ro
      - ./app/scripts:/app/scripts:ro
      - ./app/status-api:/app/status-api:ro

      # Logs and status.json — writable, shared with host restic-status.sh
      - ./logs:/app/logs

      # Data sources (read-only)
      - /var/lib/docker/volumes:/data/docker-volumes:ro
      - /home/ecloaiza:/data/bind-volumes:ro

      # Restic repository — symlink → NFS mount managed by host nfs-auto-mount.sh
      - ./backup:/backup

      # Timezone consistency
      - /etc/localtime:/etc/localtime:ro

    ports:
      - "8484:8484"

    networks:
      - default

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "restic"

networks:
  default:
    name: frontend
    external: true
