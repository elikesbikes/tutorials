services:
  restic:
    build: .
    container_name: restic
    hostname: ${CONTAINER_HOSTNAME:-ranger0}
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # App code — bind-mounted individually so changes take effect without a rebuild
      - ./app/entrypoint.sh:/app/entrypoint.sh:ro
      - ./app/scripts:/app/scripts:ro
      - ./app/status-api:/app/status-api:ro

      # Job definitions — one .conf per backup job (see jobs/example.conf.example)
      - ./jobs:/app/jobs:ro

      # Logs and per-job status files — writable, shared with host restic-status.sh
      - ./logs:/app/logs

      # Data sources are HOST-SPECIFIC and live in docker-compose.override.yml
      # (merged automatically by docker compose). This base file stays identical
      # across hosts. See docker-compose.override.yml.example.

      # Restic repository — symlink → NFS mount managed by host nfs-auto-mount.sh
      - ./backup:/backup

      # Timezone consistency
      - /etc/localtime:/etc/localtime:ro

    ports:
      - "8484:8484"

    networks:
      - default

    # Ship container stdout to the homelab Graylog syslog server. Backup/cleanup
    # job output reaches stdout via the /proc/1/fd/1 routing in entrypoint.sh,
    # so scheduled runs land in Graylog too (not just entrypoint/status-api).
    # `docker compose logs` still works locally thanks to Docker's dual-logging
    # cache (Engine 20.10+), so logs are available in both places.
    logging:
      driver: syslog
      options:
        # Graylog runs on endurance (192.168.5.30). 192.168.5.16 is a reverse
        # proxy that does NOT forward syslog — sending there silently drops logs.
        syslog-address: "udp://192.168.5.30:514"
        # Match the RFC3164 format the hosts/router already send (Graylog's
        # Syslog input parses it); Docker's default rfc5424 was not ingested.
        syslog-format: "rfc3164"
        tag: "restic"

networks:
  default:
    name: frontend
    external: true
