###############################################################
#                   Authelia configuration                    #
###############################################################

server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: debug

totp:
  issuer: elikesbikes.com
  period: 30
  skew: 1

webauthn:
  disable: false
  display_name: 'elikesbikes homelab'        # shown in the browser passkey prompt
  attestation_conveyance_preference: 'indirect'
  timeout: '60s'
  # Passkey (usernameless) login — adds a "Sign in with a passkey" button. Authelia 4.39+.
  # RP ID is inherited from the session cookie domain (home.elikesbikes.com), so a passkey
  # registered once works across all *.home.elikesbikes.com apps and both portals.
  enable_passkey_login: true

#duo_api:     ## You can use this api if you want push notifications of auth attempts
#  hostname: api-123456789.example.com
#  integration_key: ABCDEF
#  secret_key: yet-another-long-string-of-characters-and-numbers-and-symbols

authentication_backend:
  #disable_reset_password: false
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 64
      
access_control:
  default_policy: deny
  rules:
    # Rules applied to everyone
    # Both portal hostnames listed so this shared config works on either host
    # (auth-dev = tars/dev, auth-end = endurance/prod). The non-local one is inert.
    - domain:
        - "auth-dev.home.elikesbikes.com"
        - "auth-end.home.elikesbikes.com"
      policy: bypass
    - domain:
        - "dash.home.elikesbikes.com"
        - "home.elikesbikes.com"
        - "elikesbikes.com"                
      policy: one_factor
#      networks:
#       - 192.168.5.0/24
    # COOPER backend service account — 1FA only (can't complete OTP). MUST stay ABOVE
    # the two_factor reviere rule so browser users still get OTP (first-match wins).
    # cooper-svc user exists only on endurance, so this rule is inert on tars.
    # (Was previously injected into endurance's local config by setup_cooper_svc.py;
    # baked into shared config here so deploys don't drop it again.)
    - domain:
        - "reviere.home.elikesbikes.com"
        - "reviere-dev.home.elikesbikes.com"
      subject:
        - "user:cooper-svc"
      policy: one_factor
    # Both reviere hostnames listed so the shared config covers prod (endurance) and
    # dev (tars). Domains are globally unique, so the non-local one never matches.
    - domain:
        - "docker.home.elikesbikes.com"
        - "reviere.home.elikesbikes.com"
        - "reviere-dev.home.elikesbikes.com"
      policy: two_factor
#     networks:
#       - 192.168.1.0/24

session:
  # This secret can also be set using the env variables AUTHELIA_SESSION_SECRET_FILE
  expiration: 3600 # 1 hour
  inactivity: 7200 # 2 hours
  remember_me: 24h # "Remember me" cookie lasts 24 hours (was default ~1 month)
  # session.cookies is HOST-SPECIFIC (auth-dev vs auth-end) and therefore lives in a
  # per-host override file loaded after this one: /secrets/configuration.host.yml
  # (git-ignored + excluded from the deploy rsync). See docker-compose.yml command.
  # Authelia merges multiple --config files; the later file's session.cookies list wins.

  redis:
    host: authelia-redis-prod1
    port: 6379
    # This secret can also be set using the env variables AUTHELIA_SESSION_REDIS_PASSWORD_FILE
#    password: authelia

regulation:
  max_retries: 5
  find_time: 2m
  ban_time: 10m
  
theme: dark

storage:
  local:
    path: /config/db.sqlite3

notifier:
  #filesystem:
  #  filename: /config/notification.txt
  smtp:
    username: ecloaiza@gmail.com
    address: submission://smtp.gmail.com:587
    sender: "Uptime Kuma <any@elikesbikes.com>"
    subject: "[Authelia] {title}"
  #  startup_check_address: smarth@elikesbikes.com
    disable_require_tls: true
  #  disable_html_emails: false
    #tls:
    #  server_name: smtppro.zoho.com
    #  skip_verify: false
    #  minimum_version: TLS1.2