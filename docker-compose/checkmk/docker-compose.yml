name: checkmk

services:
  checkmk:
    image: checkmk/check-mk-raw:latest
    container_name: checkmk-prod-1
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: US/Pacific
    # No published ports — web UI (5000) served via Traefik. The agent receiver
    # (8000) is unused (0 registered agents); re-publish "8001:8000" only if you
    # later set up checkmk agent push/registration.
    volumes:
      - ./data/omd:/omd/sites
    tmpfs:
      - /opt/omd/sites/${CMK_SITE_ID}/tmp:uid=1000,gid=1000
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.5.20:1514"
        tag: "checkmk"
    networks:
      default:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.checkmk.rule=Host(`monitoring.home.elikesbikes.com`)"
      - "traefik.http.routers.checkmk.entrypoints=websecure"
      - "traefik.http.routers.checkmk.tls.certresolver=production"
      - "traefik.http.routers.checkmk.middlewares=security-headers@file"
      - "traefik.http.services.checkmk.loadbalancer.server.port=5000"

networks:
  default:
    name: frontend
    external: true
