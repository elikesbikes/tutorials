services:
  uptime-kuma:
    image: louislam/uptime-kuma:2.2.0
    container_name: uptime-prod-1
    hostname: uptime-prod-3
    environment:
      - "TZ=America/Los_Angeles"
    volumes:
      - ./uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frontend
    # Ports no longer published — reachable only through Traefik on the frontend network.
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`uptime.home.elikesbikes.com`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls.certresolver=production"
      - "traefik.http.routers.uptime.middlewares=security-headers@file"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

volumes:
  uptime-kuma:
networks:
  frontend:
    external: true
