# ------------------------------------------------------------
# docker-compose.yml
#
# Service: syncthing-health
# Version: 1.9.0
#
# Description:
# Syncthing health, device sync lag, and device offline monitoring
# endpoints exposed over HTTP for Uptime Kuma, with transition-based
# ntfy alerts.
#
# Endpoints:
#   - Port 9123: Overall Syncthing health
#   - Port 9124: Device-specific sync lag monitor
#   - Port 9125: Device offline / last-seen monitor
#
# Design notes:
# - Uses a prebuilt Alpine image with dependencies baked in
# - NO runtime apk installs (production-safe)
# - NO top-level 'version:' key (Compose v2 rule)
# - Single container, multiple listeners
#
# Changelog (running):
# - 1.9.0: Move all scripts into scripts/; rename to consistent underscore convention
# - 1.8.0: Move env file into project as .env; drop absolute host path references
# - 1.7.0: Add device offline (last-seen) monitoring endpoint on port 9125
# - 1.6.0: Move all dependencies to Dockerfile; remove runtime apk installs
# - 1.5.0: Add second HTTP endpoint (port 9124) for device sync lag monitoring
# - 1.4.0: Add persistent state volume for transition-based ntfy notifications
# - 1.2.4: Removed obsolete top-level 'version:' key (Compose v2 rule)
# - 1.2.3: Fix socat PATH issue by using absolute binary path
# - 1.2.2: Fix invalid HTTP responses by switching from nc to socat
# - 1.2.1: Converted changelog to cumulative format
# - 1.2.0: Added optional debug logging
# - 1.1.2: Added bash runtime dependency
# - 1.1.1: Fixed RO volume startup failure
# - 1.1.0: Added external frontend Docker network
# ------------------------------------------------------------

services:
  syncthing-health:
    container_name: syncthing-health

    # Build locally to guarantee bash, curl, jq, socat availability
    build:
      context: .
      dockerfile: dockerfile

    env_file:
      - .env

    # Host ports removed — served via Traefik (path-based) on the frontend network.

    networks:
      - frontend

    volumes:
      - ./scripts/health.sh:/app/health.sh:ro
      - ./scripts/health_http.sh:/app/health_http.sh:ro
      - ./scripts/device_sync_monitor.sh:/app/device_sync_monitor.sh:ro
      - ./scripts/device_sync_http.sh:/app/device_sync_http.sh:ro
      - ./scripts/device_offline_monitor.sh:/app/device_offline_monitor.sh:ro
      - ./scripts/device_offline_http.sh:/app/device_offline_http.sh:ro

      # Persistent state + logs
      - ./state:/state

      # Explicit env mount for container root user (scripts source this file directly)
      - ./.env:/root/.syncthing-health.env:ro

    command: >
      sh -c "
        /usr/bin/socat TCP-LISTEN:9123,reuseaddr,fork EXEC:'/bin/bash /app/health_http.sh' &
        /usr/bin/socat TCP-LISTEN:9124,reuseaddr,fork EXEC:'/bin/bash /app/device_sync_http.sh' &
        /usr/bin/socat TCP-LISTEN:9125,reuseaddr,fork EXEC:'/bin/bash /app/device_offline_http.sh' &
        wait
      "

    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.synchealth-health.rule=Host(`syncthing-ranger0-health.home.elikesbikes.com`) && PathPrefix(`/health`)"
      - "traefik.http.routers.synchealth-health.entrypoints=websecure"
      - "traefik.http.routers.synchealth-health.tls.certresolver=production"
      - "traefik.http.routers.synchealth-health.middlewares=security-headers@file"
      - "traefik.http.routers.synchealth-health.service=synchealth-health"
      - "traefik.http.services.synchealth-health.loadbalancer.server.port=9123"
      - "traefik.http.routers.synchealth-synclag.rule=Host(`syncthing-ranger0-health.home.elikesbikes.com`) && PathPrefix(`/sync-lag`)"
      - "traefik.http.routers.synchealth-synclag.entrypoints=websecure"
      - "traefik.http.routers.synchealth-synclag.tls.certresolver=production"
      - "traefik.http.routers.synchealth-synclag.middlewares=security-headers@file"
      - "traefik.http.routers.synchealth-synclag.service=synchealth-synclag"
      - "traefik.http.services.synchealth-synclag.loadbalancer.server.port=9124"
      - "traefik.http.routers.synchealth-offline.rule=Host(`syncthing-ranger0-health.home.elikesbikes.com`) && PathPrefix(`/offline`)"
      - "traefik.http.routers.synchealth-offline.entrypoints=websecure"
      - "traefik.http.routers.synchealth-offline.tls.certresolver=production"
      - "traefik.http.routers.synchealth-offline.middlewares=security-headers@file"
      - "traefik.http.routers.synchealth-offline.service=synchealth-offline"
      - "traefik.http.services.synchealth-offline.loadbalancer.server.port=9125"

networks:
  frontend:
    external: true
