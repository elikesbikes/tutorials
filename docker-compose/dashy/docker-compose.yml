networks:
  frontend:
    external: true
services:
  dashy:
    container_name: Dashy
    hostname: dashy
    image: lissy93/dashy
    volumes:
      - ./conf/conf.yml:/app/user-data/conf.yml
      - ./item-icons:/app/public/item-icons
    # 4000 no longer published — served via Traefik (dash.home), behind Authelia.
    networks:
      frontend:
    environment:
      - NODE_ENV=production
      - "TZ=America/Los_Angeles"
    user: 0:0
    restart: unless-stopped
    logging:
      driver: syslog
      options:
        syslog-address: "udp://192.168.5.20:1514"
        #syslog-format: "rfc3164"
        tag: "dashy"
    healthcheck:
      test: ['CMD', 'node', '/app/services/healthcheck']
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashy.rule=Host(`dash.home.elikesbikes.com`)"
      - "traefik.http.routers.dashy.entrypoints=websecure"
      - "traefik.http.routers.dashy.tls.certresolver=production"
      # Authelia ForwardAuth (defined on the authelia container) gates access;
      # unauthenticated users are redirected to auth.home for login.
      - "traefik.http.routers.dashy.middlewares=authelia@docker,security-headers@file"
      - "traefik.http.services.dashy.loadbalancer.server.port=8080"
