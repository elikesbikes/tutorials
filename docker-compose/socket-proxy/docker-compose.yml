services:
  socket-proxy:
    restart: unless-stopped
    container_name: socket-proxy
    networks:
      frontend:
    security_opt:
      - no-new-privileges:true
    environment:
      - ALLOW_START=1 #optional
      - ALLOW_STOP=1 #optional
      - ALLOW_RESTARTS=0 #optional
      - AUTH=1 #optional
      - BUILD=1 #optional
      - COMMIT=1 #optional
      - CONFIGS=1 #optional
      - CONTAINERS=1 #optional
      - DISABLE_IPV6=1 #optional
      - DISTRIBUTION=1 #optional
      - EVENTS=1 #optional
      - EXEC=1 #optional
      - IMAGES=1 #optional
      - INFO=1 #optional
      - LOG_LEVEL=info #optional
      - NETWORKS=1 #optional
      - NODES=1 #optional
      - PING=1 #optional
      - PLUGINS=1 #optional
      - POST=1 #optional
      - SECRETS=1 #optional
      - SERVICES=1 #optional
      - SESSION=1 #optional
      - SWARM=1 #optional
      - SYSTEM=1 #optional
      - TASKS=1 #optional
      - TZ=Etc/UTC #optional
      - VERSION=1 #optional
      - VOLUMES=1 #optional
    image: lscr.io/linuxserver/socket-proxy:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    read_only: true
    tmpfs:
      - /run
    # Host port 2375 is intentionally NOT published — the Docker API is no longer
    # exposed on the LAN. Traefik reaches socket-proxy internally over the frontend
    # network, and external access goes through Traefik (HTTPS + IP allowlist) only.
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.socketproxy.rule=Host(`socketproxy-tars.home.elikesbikes.com`)"
      - "traefik.http.routers.socketproxy.entrypoints=websecure"
      - "traefik.http.routers.socketproxy.tls.certresolver=production"
      - "traefik.http.routers.socketproxy.middlewares=socketproxy-allowlist@file,security-headers@file"
      - "traefik.http.services.socketproxy.loadbalancer.server.port=2375"
networks:
  frontend:
    external: true
